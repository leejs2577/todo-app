<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <h1>할 일</h1>
        <button id="theme-toggle" class="theme-toggle" title="테마 변경">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- 새 TODO 추가 폼 -->
    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="title-input"
        placeholder="무엇을 해야 하나요?"
        required
        maxlength="100"
        autocomplete="off"
      >
      <textarea
        id="desc-input"
        placeholder="설명 (선택사항)"
        rows="2"
        maxlength="500"
      ></textarea>
      <button type="submit" class="btn-primary">추가</button>
    </form>

    <!-- 통계 -->
    <div class="stats" id="stats">
      <div class="stat-item">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">전체</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-active">0</div>
        <div class="stat-label">진행 중</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-completed">0</div>
        <div class="stat-label">완료</div>
      </div>
    </div>

    <!-- 필터 버튼 -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="active">진행 중</button>
      <button class="filter-btn" data-filter="completed">완료</button>
    </div>

    <!-- TODO 목록 -->
    <ul id="todo-list" class="todo-list">
      <!-- 동적으로 렌더링됨 -->
    </ul>

    <!-- 로딩 표시 -->
    <div id="loading" class="loading hidden">로딩 중...</div>

    <!-- 에러 메시지 -->
    <div id="error" class="error hidden"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
